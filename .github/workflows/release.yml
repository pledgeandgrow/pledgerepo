# cargo-dist release workflow
# This file is auto-generated by `cargo dist init` and customized for pledgepack.
# It builds pre-compiled binaries for Windows, macOS, and Linux on git tag push.

name: Release

permissions:
  contents: write

# Trigger on tag push matching v*.*.*
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
      - "pledgepack-cli-v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  # Plan the release — determine what apps to build and publish
  plan:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.plan.outputs.tag }}
      app-name: ${{ steps.plan.outputs.app-name }}
      app-version: ${{ steps.plan.outputs.app-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cargo-dist
        run: cargo install cargo-dist --version 0.28.0

      - name: Plan release
        id: plan
        run: cargo dist plan --output-format=json > plan.json

      - name: Parse plan
        id: parse
        run: |
          echo "tag=$(jq -r '.tag' plan.json)" >> $GITHUB_OUTPUT
          echo "app-name=$(jq -r '.artifacts[0].name' plan.json)" >> $GITHUB_OUTPUT
          echo "app-version=$(jq -r '.artifacts[0].version' plan.json)" >> $GITHUB_OUTPUT

  # Build binaries for each platform
  build:
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-2022
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: "0.14.0"

      - name: Build Zig native library
        run: zig build -Doptimize=ReleaseFast

      - name: Build pledge binary
        run: cargo build --release --target ${{ matrix.target }} --bin pledge

      - name: Package binary (Unix)
        if: matrix.os != 'windows-2022'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/pledge dist/
          tar czf pledge-${{ matrix.target }}.tar.gz -C dist pledge

      - name: Package binary (Windows)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.target }}/release/pledge.exe dist/
          Compress-Archive -Path dist/pledge.exe -DestinationPath pledge-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pledge-${{ matrix.target }}
          path: |
            pledge-${{ matrix.target }}.tar.gz
            pledge-${{ matrix.target }}.zip

  # Publish GitHub Release with all binaries
  publish:
    needs: [plan, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.plan.outputs.tag }}
          name: Release ${{ needs.plan.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip

  # Publish npm package with binary launcher
  publish-npm:
    needs: [plan, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage binaries for npm package
        run: |
          mkdir -p bin/platform
          for dir in artifacts/pledge-*; do
            target=$(basename "$dir")
            if [ -f "$dir/pledge-$target.tar.gz" ]; then
              mkdir -p "bin/platform/$target"
              tar xzf "$dir/pledge-$target.tar.gz" -C "bin/platform/$target"
            fi
          done

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
