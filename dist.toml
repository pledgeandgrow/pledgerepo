# cargo-dist configuration
# https://opensource.axo.dev/cargo-dist/book/

[dist]
# The preferred dist version to use in CI
cargo-dist-version = "0.28.0"

# CI backends to support
ci = ["github"]

# The installers to generate for each app
installers = ["shell", "npm", "homebrew"]

# Target platforms to build binaries for
targets = [
    "x86_64-pc-windows-msvc",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
]

# Which actions to run on push events
publish-prereleases = true

# Whether to create a GitHub Release or use an existing draft
create-release = true

# Path to the GitHub repository
github-repository = "pledgeandgrow/pledgerepo"

# The npm package to publish
npm-package = "pledgepack"

# Homebrew tap repository
homebrew-tap = "pledgeandgrow/homebrew-tap"

# Install only the CLI binary
install-path = ["$HOME/.pledge/bin", "$PLEDGE_HOME/bin"]

# Custom artifacts beyond the binaries
[dist.binaries]
pledge = { source = "crates/cli" }
