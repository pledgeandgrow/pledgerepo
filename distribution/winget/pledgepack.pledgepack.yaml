License: MIT
LicenseUrl: https://github.com/pledgepack/pledgepack/blob/main/LICENSE
ShortDescription: A Rust+Zig bundler with incremental computation, WASM plugins, and Rollup-quality output
Description: |-
  Pledgepack is a next-generation bundler built with Rust and Zig that offers:
  - Incremental computation with function-level caching
  - WASM plugin system for framework compilers
  - Rollup-quality tree-shaking and chunk splitting
  - Built-in dev server with HMR
  - Zero-config framework detection
